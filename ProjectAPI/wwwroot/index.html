<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Manager</title>
</head>
<body>
    <h1>Products:</h1>
    <ul id="products-list"></ul>

    <h2>Create a Product</h2>
    <form id="create-product-form">
        <label>
            Name: <input type="text" id="product-name" required>
        </label><br>
        <label>
            Price: <input type="number" id="product-price" required>
        </label><br>
        <label>
            Inventory: <input type="number" id="product-inventory" required>
        </label><br>
        <button type="submit">Create Product</button>
    </form>

    <div id="confirmation-message">
        Product Created!<a href="index.html">Return</a>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
